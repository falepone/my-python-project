name: Semi-Automatic PR Workflow

on:
  push:
    branches:
      - dev
      - feature/**

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if PR exists
        id: check_pr
        run: |
          # Son commit'i kontrol et
          LAST_COMMIT=$(git log -1 --pretty=%B)
          echo "Last commit: $LAST_COMMIT"
          
          # Auto-update commit'i kontrol et
          if [[ "$LAST_COMMIT" == Auto-update* ]]; then
            echo "Auto-update detected"
            echo "should_create_pr=true" >> $GITHUB_OUTPUT
          else
            echo "Manual commit - skipping auto-PR"
            echo "should_create_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_pr.outputs.should_create_pr == 'true'
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ github.event.head_commit.message }}
          title: "🤖 Auto-update: ${{ github.event.head_commit.timestamp }}"
          body: |
            Otomatik olarak oluşturulan Pull Request
            
            **Commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Timestamp:** ${{ github.event.head_commit.timestamp }}
            
            ---
            
            Eğer test başarılı olursa bu PR otomatik merge edilebilir.
          branch: pr/${{ github.run_number }}
          delete-branch: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run Tests (Optional)
        run: |
          pip install pytest pylint
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # pytest'i çalıştır (varsa)
          pytest . || true
